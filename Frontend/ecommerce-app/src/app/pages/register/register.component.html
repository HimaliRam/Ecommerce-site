<div class="login-container">

  <!-- LEFT SIDE (IMAGE / BRAND) -->
  <div class="left-panel">
    <div class="brand">
      <h1>ShopEase</h1>
      <p>Experience smarter shopping</p>
    </div>
  </div>

  <!-- RIGHT SIDE (REGISTRATION FORM) -->
  <div class="right-panel">

    <form (ngSubmit)="register()" class="glass-card" autocomplete="off">

      <!-- 🔥 Hidden inputs (DO NOT REMOVE) -->
      <input type="text" name="fakeuser" style="display:none">
      <input type="password" name="fakepass" style="display:none">

      <h2>Create Account 👋</h2>
      <p class="subtitle">Sign up to get started</p>

      <!-- FULL NAME -->
      <div class="input-group">
        <input type="text"
               [(ngModel)]="name"
               name="name"
               required
               autocomplete="off">
        <label>Full Name</label>
      </div>

      <!-- EMAIL -->
      <div class="input-group">
        <input type="email"
               [(ngModel)]="email"
               name="email"
               required
               autocomplete="off"
               inputmode="email"
               autocorrect="off"
               autocapitalize="none"
               spellcheck="false">
        <label>Email</label>
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <input type="password"
               [(ngModel)]="password"
               name="password"
               required
               autocomplete="new-password">
        <label>Password</label>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="input-group">
        <input type="password"
               [(ngModel)]="confirmPassword"
               name="confirmPassword"
               required
               autocomplete="new-password">
        <label>Confirm Password</label>
      </div>

      <button type="submit">Register →</button>

      <div class="signup">
        Already have an account?
        <a (click)="goToLogin($event)">Login</a>
      </div>

    </form>

  </div>

</div>
